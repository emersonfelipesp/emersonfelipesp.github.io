  <text class="mono" x="330" y="607" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#adbac7">netbox · REST API</tspan><tspan fill="#768390" font-size="11"> 4.5.x / 4.6.x</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <rect x="660" y="582" width="220" height="40" fill="#161b22" stroke="#373e47"/>
  <text class="mono" x="770" y="607" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#adbac7">Proxmox VE</tspan><tspan fill="#768390" font-size="11"> 7.x / 8.x</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- Proxmox VE → 3-service fork -->
