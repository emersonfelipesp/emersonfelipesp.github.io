  <text class="mono" x="345" y="558" font-size="10" fill="#768390" letter-spacing="1">REST</text>
  <line x1="770" y1="536" x2="770" y2="572" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="mono" x="785" y="558" font-size="10" fill="#768390" letter-spacing="1">REST</text>

