  <text class="mono" x="78" y="847" fill="#adbac7" font-size="11">featured · base plugin extended by the others</text>

  <rect x="56" y="858" width="14" height="14" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="78" y="869" fill="#adbac7" font-size="11">highlight · projects I own (netbox-proxbox, proxbox-api, netbox-sdk, proxmox-sdk, plus the four sibling plugins)</text>

  <rect x="56" y="880" width="14" height="14" fill="#161b22" stroke="#373e47"/>
  <text class="mono" x="78" y="891" fill="#adbac7" font-size="11">downstream · external REST APIs and service surfaces consumed by my projects</text>

  <text class="mono" x="56" y="908" fill="#768390" fill-opacity="0.75" font-size="10">edges — solid: data path · dashed: "extends" (base relationship) · labels above arrows describe transport, auth, or role</text>

  <!-- Footer caption -->
  <text class="mono" x="16" y="940" fill="#768390" fill-opacity="0.7" font-size="10">netbox → 5 NetBox plugins (netbox-proxbox is the base) → proxbox-api (FastAPI :8000) → netbox-sdk / proxmox-sdk → REST APIs and Proxmox service surfaces</text>
