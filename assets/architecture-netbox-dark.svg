<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-label="How my projects fit together: netbox extended by 5 NetBox plugins (netbox-proxbox base plus netbox-ceph, netbox-pbs, netbox-pdm, netbox-packer) flowing into proxbox-api, which forks to netbox-sdk and proxmox-sdk; those SDKs speak REST to NetBox and to Proxmox VE plus its Ceph, PBS, and PDM service APIs.">
