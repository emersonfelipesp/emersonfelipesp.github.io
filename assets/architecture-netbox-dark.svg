  <line x1="430" y1="660" x2="970" y2="660" stroke="#768390" stroke-width="1"/>
  <line x1="430" y1="660" x2="430" y2="698" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="660" x2="700" y2="698" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="970" y1="660" x2="970" y2="698" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>

