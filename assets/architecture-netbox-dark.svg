    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">netbox-ceph</tspan><tspan fill="#768390" font-size="11"> plugin</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- netbox-pbs -->
  <rect x="240" y="196" width="180" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
  <text class="mono" x="330" y="221" text-anchor="middle" font-size="13">
