    <tspan fill="#768390">[ </tspan><tspan fill="#539bf5">netbox-sdk</tspan><tspan fill="#768390" font-size="11"> 0.0.8.post1</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <rect x="660" y="496" width="220" height="40" fill="#161b22" stroke="#539bf5" stroke-opacity="0.7"/>
