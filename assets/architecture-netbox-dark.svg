  </text>

  <!-- Plugin fork connector: netbox → 5 plugins -->
  <line x1="550" y1="118" x2="550" y2="148" stroke="#768390" stroke-width="1"/>
  <line x1="130" y1="148" x2="970" y2="148" stroke="#768390" stroke-width="1"/>
  <line x1="130" y1="148" x2="130" y2="186" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="330" y1="148" x2="330" y2="186" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="550" y1="148" x2="550" y2="186" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="770" y1="148" x2="770" y2="186" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="970" y1="148" x2="970" y2="186" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="mono" x="550" y="142" text-anchor="middle" font-size="10" fill="#768390" fill-opacity="0.7" letter-spacing="1">PLUGIN</text>

