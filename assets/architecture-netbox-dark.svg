  <text class="mono" x="430" y="733" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#adbac7">proxmox · ceph</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <rect x="610" y="708" width="180" height="40" fill="#161b22" stroke="#373e47"/>
  <text class="mono" x="700" y="733" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#adbac7">proxmox · PBS</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <rect x="880" y="708" width="180" height="40" fill="#161b22" stroke="#373e47"/>
  <text class="mono" x="970" y="733" text-anchor="middle" font-size="13">
    <tspan fill="#768390">[ </tspan><tspan fill="#adbac7">proxmox · PDM</tspan><tspan fill="#768390"> ]</tspan>
  </text>

  <!-- ============ LEGEND ============ -->
