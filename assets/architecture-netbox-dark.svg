  <line x1="770" y1="292" x2="770" y2="318" stroke="#768390" stroke-width="1"/>
  <line x1="970" y1="292" x2="970" y2="318" stroke="#768390" stroke-width="1"/>
  <line x1="130" y1="318" x2="970" y2="318" stroke="#768390" stroke-width="1"/>
  <line x1="550" y1="318" x2="550" y2="362" stroke="#768390" stroke-width="1" marker-end="url(#arrow)"/>

  <text class="mono" x="550" y="338" text-anchor="middle" font-size="11" fill="#768390" letter-spacing="1">HTTP REST · SSE · WEBSOCKET</text>
  <text class="mono" x="550" y="354" text-anchor="middle" font-size="10" fill="#768390" fill-opacity="0.75" letter-spacing="0.5">auth: X-Proxbox-API-Key</text>

